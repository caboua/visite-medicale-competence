<!doctype html><html lang="fr"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vider cache</title><body style="font-family:system-ui;padding:24px;background:#f3f7f6"><h1>Vider le cache Visite Médicale</h1><p>Utilise cette page si ton iPhone ou Chrome garde une ancienne version.</p><button style="padding:12px 18px;border:0;border-radius:12px;background:#0f766e;color:white;font-weight:800" onclick="go()">Vider le cache maintenant</button><pre id="out"></pre><script>async function go(){out.textContent='Nettoyage...'; if('serviceWorker' in navigator){let regs=await navigator.serviceWorker.getRegistrations(); for(const r of regs) await r.unregister();} if('caches' in window){let keys=await caches.keys(); for(const k of keys) await caches.delete(k);} localStorage.removeItem('vmc_agents_v17'); out.textContent='Cache nettoyé. Ouverture de la V18...'; setTimeout(()=>location.href='./?reset=1&v=18',800);}</script></body></html>
