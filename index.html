<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>VISITE MÉDICALE & COMPÉTENCE</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0f766e"><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f4f7f7;color:#123}header{background:#0f766e;color:white;padding:22px 16px 18px;border-radius:0 0 24px 24px;position:sticky;top:0;z-index:2}h1{font-size:22px;margin:0}.sub{opacity:.9;font-size:13px;margin-top:5px}main{padding:14px;max-width:980px;margin:auto}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{background:white;border-radius:18px;padding:14px;box-shadow:0 3px 12px #0001}.kpi{font-size:28px;font-weight:800}.label{font-size:12px;color:#64748b}.tabs{display:flex;gap:8px;overflow:auto;margin:12px 0}button,.tab{border:0;border-radius:999px;padding:10px 14px;background:#e2e8f0;font-weight:700}.active{background:#0f766e;color:white}input,select,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:12px;margin:6px 0 10px;background:white}.agent{display:flex;justify-content:space-between;gap:8px;align-items:center;border-bottom:1px solid #e2e8f0;padding:12px 0}.agent:last-child{border-bottom:0}.pill{padding:6px 9px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.ok{background:#dcfce7;color:#166534}.soon{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.muted{color:#64748b;font-size:13px}.hidden{display:none}.actions{display:flex;gap:8px;flex-wrap:wrap}.full{grid-column:1/-1}@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}</style></head><body><header><h1>VISITE MÉDICALE & COMPÉTENCE</h1><div class="sub">CIS Bouillante — suivi aptitude / inaptitude</div></header><main><div class="tabs"><button class="tab active" onclick="show('dashboard',this)">Tableau</button><button class="tab" onclick="show('agents',this)">Agents</button><button class="tab" onclick="show('maj',this)">Mise à jour mail</button></div><section id="dashboard"><div class="grid"><div class="card"><div class="kpi" id="total">0</div><div class="label">Agents</div></div><div class="card"><div class="kpi" id="ok">0</div><div class="label">À jour</div></div><div class="card"><div class="kpi" id="soon">0</div><div class="label">Expire ≤ 30 j</div></div><div class="card"><div class="kpi" id="bad">0</div><div class="label">Non à jour</div></div><div class="card full"><b>Priorités</b><div id="priorites"></div></div></div></section><section id="agents" class="hidden"><input id="search" placeholder="Rechercher un agent..." oninput="renderAgents()"><select id="filter" onchange="renderAgents()"><option value="">Tous</option><option>NON A JOUR</option><option>EXPIRE BIENTOT</option><option>A JOUR</option><option>SPP</option><option>SPV</option></select><div class="card" id="list"></div></section><section id="maj" class="hidden"><div class="card"><b>Coller ici le contenu d’un mail reçu</b><textarea id="mail" rows="8" placeholder="Exemple : SAINT-PHOR Thierry&#10;Visite du 10/06/2026&#10;Apte&#10;Prochaine visite 10/06/2027"></textarea><div class="actions"><button class="active" onclick="analyseMail()">Analyser le mail</button><button onclick="exportData()">Exporter JSON</button></div><pre id="result"></pre></div></section></main><script>let agents=[];function cls(a){return a.aptitude==='A JOUR'?'ok':(a.aptitude==='EXPIRE BIENTOT'?'soon':'bad')}function load(){fetch('agents.json').then(r=>r.json()).then(d=>{agents=JSON.parse(localStorage.getItem('agentsCIS')||'null')||d;render();})}function show(id,btn){document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(id==='agents')renderAgents()}function render(){document.getElementById('total').textContent=agents.length;document.getElementById('ok').textContent=agents.filter(a=>a.aptitude==='A JOUR').length;document.getElementById('soon').textContent=agents.filter(a=>a.aptitude==='EXPIRE BIENTOT').length;document.getElementById('bad').textContent=agents.filter(a=>a.aptitude==='NON A JOUR').length;let p=agents.filter(a=>a.aptitude!=='A JOUR'||a.bilanAFaire||a.previsite).slice(0,12);document.getElementById('priorites').innerHTML=p.map(a=>`<div class="agent"><div><b>${a.nom} ${a.prenom}</b><div class="muted">${a.statut} — prochaine visite : ${a.prochaineVisite||''}<br>${a.observations||''}</div></div><span class="pill ${cls(a)}">${a.aptitude}</span></div>`).join('')}function renderAgents(){let q=(document.getElementById('search').value||'').toLowerCase(),f=document.getElementById('filter').value;let arr=agents.filter(a=>(a.nom+' '+a.prenom).toLowerCase().includes(q)&&(!f||a.aptitude===f||a.statut===f));document.getElementById('list').innerHTML=arr.map(a=>`<div class="agent"><div><b>${a.nom} ${a.prenom}</b><div class="muted">${a.statut} — ${a.prochaineVisite}<br>${a.observations||''}</div></div><span class="pill ${cls(a)}">${a.aptitude}</span></div>`).join('')||'Aucun résultat'}function analyseMail(){let t=document.getElementById('mail').value;let found=agents.find(a=>t.toLowerCase().includes(a.nom.toLowerCase())&&t.toLowerCase().includes(a.prenom.toLowerCase().split('-')[0]));let dates=[...t.matchAll(/(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4})/g)].map(m=>m[1]);let avis=/inapte/i.test(t)?'NON A JOUR':(/restriction/i.test(t)?'EXPIRE BIENTOT':'A JOUR');document.getElementById('result').textContent=JSON.stringify({agent_trouve:found?found.nom+' '+found.prenom:null,dates_detectees:dates,avis_detecte:avis},null,2)}function exportData(){let blob=new Blob([JSON.stringify(agents,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='agents_cis_bouillante.json';a.click()}if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js');load();</script></body></html>
